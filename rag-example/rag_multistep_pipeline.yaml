          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef model_deployment(\n    model_name: str,\n    namespace: str,\n\
          \    model_dir: str,\n    model_cache_pvc: str,\n    hardware_profile_name:\
          \ str = \"gpu-profile\",\n    hardware_profile_namespace: str = \"redhat-ods-applications\"\
          ,\n    min_replicas: int = 1,\n    max_replicas: int = 1,\n    gpu_count:\
