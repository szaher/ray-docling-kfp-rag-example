          ,\n    memory_requests: str = \"8Gi\",\n    cpu_limits: str = \"2\",\n \
          \   memory_limits: str = \"8Gi\",\n) -> str:\n    \"\"\"Deploy a model on\
          \ OpenShift AI using vLLM InferenceService.\n\n    Creates a vLLM NVIDIA\
          \ GPU ServingRuntime and InferenceService\n    matching the RHOAI dashboard\
          \ deployment pattern. Uses a PVC-cached\n    model to avoid re-downloading\
