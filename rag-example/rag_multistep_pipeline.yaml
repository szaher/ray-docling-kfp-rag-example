pipelineInfo:
  description: 'Multi-step RAG pipeline: parse & chunk PDFs with Docling (output to
    S3), ingest into Milvus with local or deployed embeddings, optionally deploy an
    embedding service, download and deploy an LLM for inference (cached on PVC).'
  name: rag-multi-step-pipeline
root:
  dag:
    tasks:
      condition-1:
        componentRef:
          name: comp-condition-1
        dependentTasks:
        - parse-and-chunk
        inputs:
          parameters:
            pipelinechannel--deploy_embedding:
              componentInputParameter: deploy_embedding
            pipelinechannel--embedding_gpu_count:
              componentInputParameter: embedding_gpu_count
            pipelinechannel--embedding_model:
              componentInputParameter: embedding_model
            pipelinechannel--embedding_runtime_image:
              componentInputParameter: embedding_runtime_image
            pipelinechannel--namespace:
              componentInputParameter: namespace
        taskInfo:
          name: condition-1
        triggerPolicy:
          condition: inputs.parameter_values['pipelinechannel--deploy_embedding']
            == true
      download-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-download-model
        inputs:
          parameters:
            model_cache_pvc:
              componentInputParameter: model_cache_pvc
            model_name:
              componentInputParameter: llm_model_name
        taskInfo:
          name: download-model
      ingest-to-milvus:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-ingest-to-milvus
        dependentTasks:
        - parse-and-chunk
        inputs:
          parameters:
            collection_name:
              componentInputParameter: collection_name
            embed_batch_size:
              componentInputParameter: embed_batch_size
            embedding_dim:
              componentInputParameter: embedding_dim
            embedding_endpoint:
              componentInputParameter: embedding_endpoint
            embedding_model:
              componentInputParameter: embedding_model
            milvus_batch_size:
              componentInputParameter: milvus_batch_size
            milvus_db:
              componentInputParameter: milvus_db
            milvus_host:
              componentInputParameter: milvus_host
            milvus_port:
              componentInputParameter: milvus_port
            s3_bucket:
              componentInputParameter: s3_bucket
            s3_endpoint:
              componentInputParameter: s3_endpoint
            s3_prefix:
              componentInputParameter: s3_prefix
        taskInfo:
          name: ingest-to-milvus
      model-deployment:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-model-deployment
        dependentTasks:
        - download-model
        inputs:
          parameters:
            gpu_count:
              componentInputParameter: gpu_count
            max_model_len:
              componentInputParameter: max_model_len
            model_cache_pvc:
              componentInputParameter: model_cache_pvc
            model_dir:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: download-model
            model_name:
              componentInputParameter: llm_model_name
            namespace:
              componentInputParameter: namespace
        taskInfo:
          name: model-deployment
      parse-and-chunk:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-parse-and-chunk
        inputs:
          parameters:
            batch_size:
              componentInputParameter: batch_size
            chunk_max_tokens:
              componentInputParameter: chunk_max_tokens
            cpus_per_actor:
              componentInputParameter: cpus_per_actor
            enable_profiling:
              componentInputParameter: enable_profiling
            head_cpus:
              componentInputParameter: head_cpus
            head_memory_gb:
              componentInputParameter: head_memory_gb
            input_path:
              componentInputParameter: input_path
            max_actors:
              componentInputParameter: max_actors
            min_actors:
              componentInputParameter: min_actors
            namespace:
              componentInputParameter: namespace
            num_files:
              componentInputParameter: num_files
            num_workers:
              componentInputParameter: num_workers
            pvc_mount_path:
              componentInputParameter: pvc_mount_path
            pvc_name:
              componentInputParameter: pvc_name
            ray_image:
              componentInputParameter: ray_image
            s3_bucket:
              componentInputParameter: s3_bucket
            s3_endpoint:
              componentInputParameter: s3_endpoint
            s3_prefix:
              componentInputParameter: s3_prefix
            timeout_seconds:
              componentInputParameter: timeout_seconds
            tokenizer:
              componentInputParameter: embedding_model
            verbose:
              componentInputParameter: verbose
            worker_cpus:
              componentInputParameter: worker_cpus
            worker_memory_gb:
              componentInputParameter: worker_memory_gb
        taskInfo:
          name: parse-and-chunk
  inputDefinitions:
    parameters:
      batch_size:
        defaultValue: 4.0
