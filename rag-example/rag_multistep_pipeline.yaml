          \ Namespace to deploy into.\n        model_dir: Sub-path on the PVC where\
          \ model files are stored (output from download_model).\n        model_cache_pvc:\
          \ Name of the PVC containing cached model weights.\n        hardware_profile_name:\
          \ HardwareProfile CR name for GPU resources.\n        hardware_profile_namespace:\
          \ Namespace of the HardwareProfile CR.\n        min_replicas: Minimum number\
          \ of replicas.\n        max_replicas: Maximum number of replicas.\n    \
          \    gpu_count: Number of GPUs per replica.\n        max_model_len: Maximum\
          \ context length (limits KV cache memory usage).\n        cpu_requests:\
          \ CPU requests for the predictor pod.\n        memory_requests: Memory requests\
          \ for the predictor pod.\n        cpu_limits: CPU limits for the predictor\
          \ pod.\n        memory_limits: Memory limits for the predictor pod.\n\n\
          \    Returns:\n        The inference endpoint URL.\n    \"\"\"\n    import\
          \ time\n\n    from kubernetes import client as kclient\n    from kubernetes\
          \ import config\n\n    config.load_incluster_config()\n    custom_api =\
          \ kclient.CustomObjectsApi()\n\n    isvc_name = model_name.split(\"/\")[-1].lower().replace(\"\
          .\", \"-\")\n\n    # Look up the HardwareProfile resource version for the\
          \ annotation\n    try:\n        hp = custom_api.get_namespaced_custom_object(\n\
          \            group=\"infrastructure.opendatahub.io\",\n            version=\"\
          v1\",\n            namespace=hardware_profile_namespace,\n            plural=\"\
          hardwareprofiles\",\n            name=hardware_profile_name,\n        )\n\
          \        hp_resource_version = hp[\"metadata\"][\"resourceVersion\"]\n \
          \       print(f\"Found HardwareProfile '{hardware_profile_name}' (rv={hp_resource_version}).\"\
          )\n    except kclient.rest.ApiException:\n        hp_resource_version =\
          \ \"\"\n        print(f\"HardwareProfile '{hardware_profile_name}' not found,\
          \ proceeding without it.\")\n\n    # --- Create ServingRuntime (vLLM NVIDIA\
          \ GPU, matching RHOAI template) ---\n    serving_runtime_name = isvc_name\n\
          \n    serving_runtime = {\n        \"apiVersion\": \"serving.kserve.io/v1alpha1\"\
          ,\n        \"kind\": \"ServingRuntime\",\n        \"metadata\": {\n    \
          \        \"name\": serving_runtime_name,\n            \"namespace\": namespace,\n\
          \            \"annotations\": {\n                \"opendatahub.io/apiProtocol\"\
          : \"REST\",\n                \"opendatahub.io/recommended-accelerators\"\
          : '[\"nvidia.com/gpu\"]',\n                \"opendatahub.io/runtime-version\"\
          : \"v0.11.2\",\n                \"opendatahub.io/serving-runtime-scope\"\
          : \"global\",\n                \"opendatahub.io/template-display-name\"\
          : \"vLLM NVIDIA GPU ServingRuntime for KServe\",\n                \"opendatahub.io/template-name\"\
          : \"vllm-cuda-runtime-template\",\n                \"openshift.io/display-name\"\
          : \"vLLM NVIDIA GPU ServingRuntime for KServe\",\n            },\n     \
          \       \"labels\": {\n                \"opendatahub.io/dashboard\": \"\
          true\",\n            },\n        },\n        \"spec\": {\n            \"\
          annotations\": {\n                \"opendatahub.io/kserve-runtime\": \"\
          vllm\",\n                \"prometheus.io/path\": \"/metrics\",\n       \
          \         \"prometheus.io/port\": \"8080\",\n            },\n          \
          \  \"multiModel\": False,\n            \"supportedModelFormats\": [\n  \
          \              {\n                    \"name\": \"vLLM\",\n            \
          \        \"autoSelect\": True,\n                },\n            ],\n   \
          \         \"containers\": [\n                {\n                    \"name\"\
          : \"kserve-container\",\n                    \"image\": \"registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:094db84a1da5e8a575d0c9eade114fa30f4a2061064a338e3e032f3578f8082a\"\
          ,\n                    \"command\": [\"python\", \"-m\", \"vllm.entrypoints.openai.api_server\"\
