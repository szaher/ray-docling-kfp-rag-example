          \   group=\"serving.kserve.io\",\n                version=\"v1alpha1\",\n\
          \                namespace=namespace,\n                plural=\"servingruntimes\"\
          ,\n                body=serving_runtime,\n            )\n            print(f\"\
          Created ServingRuntime '{serving_runtime_name}'.\")\n        else:\n   \
          \         raise\n\n    # --- Create or update InferenceService ---\n   \
          \ resources = {\n        \"requests\": {\"cpu\": cpu_requests, \"memory\"\
