          : memory_limits},\n    }\n    if gpu_count > 0:\n        resources[\"requests\"\
          ][\"nvidia.com/gpu\"] = str(gpu_count)\n        resources[\"limits\"][\"\
          nvidia.com/gpu\"] = str(gpu_count)\n\n    isvc_annotations = {\n       \
          \ \"serving.kserve.io/deploymentMode\": \"RawDeployment\",\n        \"security.opendatahub.io/enable-auth\"\
          : \"false\",\n        \"opendatahub.io/hardware-profile-name\": hardware_profile_name,\n\
          \        \"opendatahub.io/hardware-profile-namespace\": hardware_profile_namespace,\n\
          \        \"opendatahub.io/model-type\": \"generative\",\n        \"opendatahub.io/genai-use-case\"\
          : \"ray-rag\",\n        \"openshift.io/display-name\": isvc_name,\n    }\n\
          \    if hp_resource_version:\n        isvc_annotations[\"opendatahub.io/hardware-profile-resource-version\"\
          ] = hp_resource_version\n\n    isvc = {\n        \"apiVersion\": \"serving.kserve.io/v1beta1\"\
          ,\n        \"kind\": \"InferenceService\",\n        \"metadata\": {\n  \
          \          \"name\": isvc_name,\n            \"namespace\": namespace,\n\
          \            \"annotations\": isvc_annotations,\n            \"labels\"\
          : {\n                \"opendatahub.io/dashboard\": \"true\",\n         \
          \       \"opendatahub.io/genai-asset\": \"true\",\n            },\n    \
          \    },\n        \"spec\": {\n            \"predictor\": {\n           \
          \     \"minReplicas\": min_replicas,\n                \"maxReplicas\": max_replicas,\n\
          \                \"automountServiceAccountToken\": False,\n            \
          \    \"deploymentStrategy\": {\"type\": \"RollingUpdate\"},\n          \
          \      \"model\": {\n                    \"modelFormat\": {\"name\": \"\
          vLLM\"},\n                    \"name\": \"\",\n                    \"runtime\"\
          : serving_runtime_name,\n                    \"storageUri\": f\"pvc://{model_cache_pvc}/{model_dir}\"\
          ,\n                    \"resources\": resources,\n                },\n \
          \           },\n        },\n    }\n\n    # Delete existing InferenceService\
          \ if present to avoid stuck rolling updates\n    try:\n        custom_api.get_namespaced_custom_object(\n\
          \            group=\"serving.kserve.io\",\n            version=\"v1beta1\"\
          ,\n            namespace=namespace,\n            plural=\"inferenceservices\"\
