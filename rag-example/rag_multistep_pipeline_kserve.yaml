# PIPELINE DEFINITION
# Name: rag-multi-step-pipeline-kserve-embeddings
# Description: Multi-step RAG pipeline: parse & chunk PDFs with Docling (output to S3), deploy embedding model via KServe, ingest into Milvus with remote embeddings, download and deploy an LLM for inference.
# Inputs:
#    chunk_max_tokens: int [Default: 256.0]
#    collection_name: str [Default: 'rag_documents']
#    cpus_per_actor: int [Default: 4.0]
#    embed_batch_size: int [Default: 64.0]
#    embedding_cpu_limits: str [Default: '4']
#    embedding_cpu_requests: str [Default: '2']
#    embedding_dim: int [Default: 384.0]
#    embedding_max_replicas: int [Default: 3.0]
#    embedding_memory_limits: str [Default: '8Gi']
#    embedding_memory_requests: str [Default: '4Gi']
#    embedding_min_replicas: int [Default: 1.0]
#    embedding_model: str [Default: 'sentence-transformers/all-MiniLM-L6-v2']
#    embedding_serving_runtime: str [Default: 'embedding-runtime']
#    gpu_count: int [Default: 1.0]
#    input_path: str [Default: 'input/pdfs']
#    llm_model_name: str [Default: 'mistralai/Mistral-7B-Instruct-v0.3']
#    max_actors: int [Default: 4.0]
#    max_model_len: int [Default: 4096.0]
#    milvus_host: str [Default: 'milvus-milvus.milvus.svc.cluster.local']
#    milvus_port: int [Default: 19530.0]
#    min_actors: int [Default: 2.0]
#    model_cache_pvc: str [Default: 'model-cache-pvc']
#    namespace: str [Default: 'ray-docling']
#    num_files: int [Default: 1000.0]
#    num_workers: int [Default: 2.0]
#    pvc_mount_path: str [Default: '/mnt/data']
#    pvc_name: str [Default: 'data-pvc']
#    ray_image: str [Default: 'quay.io/rhoai-szaher/docling-ray:latest']
#    s3_bucket: str [Default: 'rag-chunks']
#    s3_endpoint: str [Default: 'http://minio-service.default.svc.cluster.local:9000']
#    s3_prefix: str [Default: 'chunks']
#    s3_secret_name: str [Default: 'minio-secret']
#    worker_cpus: int [Default: 8.0]
#    worker_memory_gb: int [Default: 16.0]
components:
  comp-deploy-embedding-model:
    executorLabel: exec-deploy-embedding-model
    inputDefinitions:
      parameters:
        cpu_limits:
          defaultValue: '4'
          description: CPU limits per replica.
          isOptional: true
          parameterType: STRING
        cpu_requests:
          defaultValue: '2'
          description: CPU requests per replica.
          isOptional: true
          parameterType: STRING
        max_replicas:
          defaultValue: 1.0
          description: Maximum number of replicas.
          isOptional: true
          parameterType: NUMBER_INTEGER
        memory_limits:
          defaultValue: 8Gi
          description: Memory limits per replica.
          isOptional: true
          parameterType: STRING
        memory_requests:
          defaultValue: 4Gi
          description: Memory requests per replica.
          isOptional: true
          parameterType: STRING
        min_replicas:
          defaultValue: 1.0
          description: Minimum number of replicas.
          isOptional: true
          parameterType: NUMBER_INTEGER
        model_name:
          description: HuggingFace model ID (e.g. 'sentence-transformers/all-MiniLM-L6-v2').
          parameterType: STRING
        namespace:
          description: Namespace to deploy the InferenceService.
          parameterType: STRING
        serving_runtime_name:
          defaultValue: embedding-runtime
          description: Name of the embedding ServingRuntime CR.
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-download-model:
    executorLabel: exec-download-model
    inputDefinitions:
      parameters:
        model_cache_mount:
          defaultValue: /mnt/models
          description: Mount path for the model cache PVC.
          isOptional: true
          parameterType: STRING
        model_cache_pvc:
          description: Name of the PVC to store models (unused here, mounted via pipeline).
          parameterType: STRING
        model_name:
          description: HuggingFace model ID (e.g. 'mistralai/Mistral-7B-Instruct-v0.3').
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-ingest-to-milvus:
    executorLabel: exec-ingest-to-milvus
    inputDefinitions:
      parameters:
        collection_name:
          defaultValue: rag_documents
          description: Milvus collection name.
          isOptional: true
          parameterType: STRING
        embed_batch_size:
          defaultValue: 64.0
          description: Batch size for embedding requests.
          isOptional: true
          parameterType: NUMBER_INTEGER
        embedding_dim:
          defaultValue: 384.0
          description: Dimension of the embedding vectors.
          isOptional: true
          parameterType: NUMBER_INTEGER
        embedding_endpoint:
          defaultValue: ''
          description: 'Optional embedding service URL. If empty,

            uses a local sentence-transformers model.'
          isOptional: true
          parameterType: STRING
        embedding_model:
          defaultValue: sentence-transformers/all-MiniLM-L6-v2
          description: Embedding model name (for API or local).
          isOptional: true
          parameterType: STRING
        milvus_batch_size:
          defaultValue: 256.0
          description: Batch size for Milvus inserts.
          isOptional: true
          parameterType: NUMBER_INTEGER
        milvus_db:
          defaultValue: default
          description: Milvus database name.
          isOptional: true
          parameterType: STRING
        milvus_host:
          description: Milvus service hostname.
          parameterType: STRING
        milvus_port:
          defaultValue: 19530.0
          description: Milvus gRPC port.
          isOptional: true
          parameterType: NUMBER_INTEGER
        s3_bucket:
          description: S3 bucket containing chunk files.
          parameterType: STRING
        s3_endpoint:
          description: S3-compatible endpoint URL (e.g. MinIO).
          parameterType: STRING
        s3_prefix:
          defaultValue: chunks
          description: Key prefix for chunk files in S3.
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-model-deployment:
    executorLabel: exec-model-deployment
    inputDefinitions:
      parameters:
        cpu_limits:
          defaultValue: '2'
          description: CPU limits for the predictor pod.
          isOptional: true
          parameterType: STRING
        cpu_requests:
          defaultValue: '2'
          description: CPU requests for the predictor pod.
          isOptional: true
          parameterType: STRING
        gpu_count:
          defaultValue: 1.0
          description: Number of GPUs per replica.
          isOptional: true
          parameterType: NUMBER_INTEGER
        hardware_profile_name:
          defaultValue: gpu-profile
          description: HardwareProfile CR name for GPU resources.
          isOptional: true
          parameterType: STRING
        hardware_profile_namespace:
          defaultValue: redhat-ods-applications
          description: Namespace of the HardwareProfile CR.
          isOptional: true
          parameterType: STRING
        max_model_len:
          defaultValue: 4096.0
          description: Maximum context length (limits KV cache memory usage).
          isOptional: true
          parameterType: NUMBER_INTEGER
        max_replicas:
          defaultValue: 1.0
          description: Maximum number of replicas.
          isOptional: true
          parameterType: NUMBER_INTEGER
        memory_limits:
          defaultValue: 8Gi
          description: Memory limits for the predictor pod.
          isOptional: true
          parameterType: STRING
        memory_requests:
          defaultValue: 8Gi
          description: Memory requests for the predictor pod.
          isOptional: true
          parameterType: STRING
        min_replicas:
          defaultValue: 1.0
          description: Minimum number of replicas.
          isOptional: true
          parameterType: NUMBER_INTEGER
        model_cache_pvc:
          description: Name of the PVC containing cached model weights.
          parameterType: STRING
        model_dir:
          description: Sub-path on the PVC where model files are stored (output from
            download_model).
          parameterType: STRING
        model_name:
          description: HuggingFace model name (e.g. 'mistralai/Mistral-7B-Instruct-v0.3').
          parameterType: STRING
        namespace:
          description: Namespace to deploy into.
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-parse-and-chunk:
    executorLabel: exec-parse-and-chunk
    inputDefinitions:
      parameters:
        batch_size:
          defaultValue: 4.0
          description: Files per batch sent to each actor.
          isOptional: true
          parameterType: NUMBER_INTEGER
        chunk_max_tokens:
          defaultValue: 256.0
          description: Max tokens per chunk (HybridChunker).
          isOptional: true
          parameterType: NUMBER_INTEGER
        cpus_per_actor:
          defaultValue: 4.0
          description: CPUs per Docling processing actor.
          isOptional: true
          parameterType: NUMBER_INTEGER
        head_cpus:
          defaultValue: 2.0
          description: CPUs for the Ray head pod.
          isOptional: true
          parameterType: NUMBER_INTEGER
        head_memory_gb:
          defaultValue: 8.0
          description: Memory (GB) for the Ray head pod.
          isOptional: true
          parameterType: NUMBER_INTEGER
        input_path:
          description: Relative path to input PDFs under the PVC.
          parameterType: STRING
        max_actors:
          defaultValue: 4.0
          description: Maximum actor pool size.
          isOptional: true
          parameterType: NUMBER_INTEGER
        min_actors:
          defaultValue: 2.0
          description: Minimum actor pool size.
          isOptional: true
          parameterType: NUMBER_INTEGER
        namespace:
          description: OpenShift namespace for the RayJob.
          parameterType: STRING
        num_files:
          defaultValue: 0.0
          description: Number of PDFs to process (0 = all).
          isOptional: true
          parameterType: NUMBER_INTEGER
        num_workers:
          defaultValue: 2.0
          description: Number of Ray worker pods.
          isOptional: true
          parameterType: NUMBER_INTEGER
        pvc_mount_path:
          description: Mount path for the PVC inside pods.
          parameterType: STRING
        pvc_name:
          description: Name of the PVC with input PDFs.
          parameterType: STRING
        ray_image:
          description: Container image with Ray + Docling pre-installed.
          parameterType: STRING
        s3_bucket:
          description: S3 bucket for output chunks.
          parameterType: STRING
        s3_endpoint:
          description: S3-compatible endpoint URL (e.g. MinIO).
          parameterType: STRING
        s3_prefix:
          defaultValue: chunks
          description: Key prefix for chunk files in S3.
          isOptional: true
          parameterType: STRING
        timeout_seconds:
          defaultValue: 600.0
          description: Per-file processing timeout.
          isOptional: true
          parameterType: NUMBER_INTEGER
        tokenizer:
          defaultValue: sentence-transformers/all-MiniLM-L6-v2
          description: Tokenizer for HybridChunker (usually the embedding model name).
          isOptional: true
          parameterType: STRING
        worker_cpus:
          defaultValue: 8.0
          description: CPUs per worker pod.
          isOptional: true
          parameterType: NUMBER_INTEGER
        worker_memory_gb:
          defaultValue: 16.0
          description: Memory (GB) per worker pod.
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-deploy-embedding-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_embedding_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kubernetes>=28.1.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_embedding_model(\n    model_name: str,\n    namespace:\
          \ str,\n    serving_runtime_name: str = \"embedding-runtime\",\n    min_replicas:\
          \ int = 1,\n    max_replicas: int = 1,\n    cpu_requests: str = \"2\",\n\
          \    cpu_limits: str = \"4\",\n    memory_requests: str = \"4Gi\",\n   \
          \ memory_limits: str = \"8Gi\",\n) -> str:\n    \"\"\"Deploy a text embedding\
          \ model using KServe InferenceService.\n\n    Args:\n        model_name:\
          \ HuggingFace model ID (e.g. 'sentence-transformers/all-MiniLM-L6-v2').\n\
          \        namespace: Namespace to deploy the InferenceService.\n        serving_runtime_name:\
          \ Name of the embedding ServingRuntime CR.\n        min_replicas: Minimum\
          \ number of replicas.\n        max_replicas: Maximum number of replicas.\n\
          \        cpu_requests: CPU requests per replica.\n        cpu_limits: CPU\
          \ limits per replica.\n        memory_requests: Memory requests per replica.\n\
          \        memory_limits: Memory limits per replica.\n\n    Returns:\n   \
          \     The embedding service endpoint URL.\n    \"\"\"\n    import time\n\
          \n    from kubernetes import client as kclient\n    from kubernetes import\
          \ config\n\n    config.load_incluster_config()\n    custom_api = kclient.CustomObjectsApi()\n\
          \n    # Derive InferenceService name from model name\n    isvc_name = model_name.split(\"\
          /\")[-1].lower().replace(\"_\", \"-\").replace(\".\", \"-\")\n\n    isvc\
          \ = {\n        \"apiVersion\": \"serving.kserve.io/v1beta1\",\n        \"\
          kind\": \"InferenceService\",\n        \"metadata\": {\n            \"name\"\
          : isvc_name,\n            \"namespace\": namespace,\n            \"annotations\"\
          : {\n                \"serving.kserve.io/deploymentMode\": \"RawDeployment\"\
          ,\n            },\n        },\n        \"spec\": {\n            \"predictor\"\
          : {\n                \"minReplicas\": min_replicas,\n                \"\
          maxReplicas\": max_replicas,\n                \"model\": {\n           \
          \         \"modelFormat\": {\"name\": \"embedding\"},\n                \
          \    \"runtime\": serving_runtime_name,\n                    \"storageUri\"\
          : f\"hf://{model_name}\",\n                    \"resources\": {\n      \
          \                  \"requests\": {\n                            \"cpu\"\
          : cpu_requests,\n                            \"memory\": memory_requests,\n\
          \                        },\n                        \"limits\": {\n   \
          \                         \"cpu\": cpu_limits,\n                       \
          \     \"memory\": memory_limits,\n                        },\n         \
          \           },\n                },\n            },\n        },\n    }\n\n\
          \    # Create or update\n    try:\n        custom_api.get_namespaced_custom_object(\n\
          \            group=\"serving.kserve.io\",\n            version=\"v1beta1\"\
          ,\n            namespace=namespace,\n            plural=\"inferenceservices\"\
          ,\n            name=isvc_name,\n        )\n        custom_api.patch_namespaced_custom_object(\n\
          \            group=\"serving.kserve.io\",\n            version=\"v1beta1\"\
          ,\n            namespace=namespace,\n            plural=\"inferenceservices\"\
          ,\n            name=isvc_name,\n            body=isvc,\n        )\n    \
          \    print(f\"InferenceService '{isvc_name}' updated.\")\n    except kclient.rest.ApiException\
          \ as e:\n        if e.status == 404:\n            custom_api.create_namespaced_custom_object(\n\
          \                group=\"serving.kserve.io\",\n                version=\"\
          v1beta1\",\n                namespace=namespace,\n                plural=\"\
          inferenceservices\",\n                body=isvc,\n            )\n      \
          \      print(f\"InferenceService '{isvc_name}' created.\")\n        else:\n\
          \            raise\n\n    # Wait for Ready\n    print(\"Waiting for embedding\
          \ InferenceService to become ready...\")\n    for _ in range(60):\n    \
          \    time.sleep(15)\n        obj = custom_api.get_namespaced_custom_object(\n\
          \            group=\"serving.kserve.io\",\n            version=\"v1beta1\"\
          ,\n            namespace=namespace,\n            plural=\"inferenceservices\"\
          ,\n            name=isvc_name,\n        )\n        conditions = obj.get(\"\
          status\", {}).get(\"conditions\", [])\n        ready = any(\n          \
          \  c.get(\"type\") == \"Ready\" and c.get(\"status\") == \"True\"\n    \
          \        for c in conditions\n        )\n        if ready:\n           \
          \ url = obj.get(\"status\", {}).get(\"url\", \"\")\n            print(f\"\
          Embedding InferenceService ready: {url}\")\n            return url\n\n \
          \   raise TimeoutError(\n        f\"Embedding InferenceService '{isvc_name}'\
          \ did not become ready \"\n        \"within 15 minutes.\"\n    )\n\n"
        image: registry.redhat.io/rhoai/odh-pipeline-runtime-datascience-cpu-py312-rhel9@sha256:f9844dc150592a9f196283b3645dda92bd80dfdb3d467fa8725b10267ea5bdbc
    exec-download-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - download_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'huggingface_hub>=0.20.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef download_model(\n    model_name: str,\n    model_cache_pvc: str,\n\
          \    model_cache_mount: str = \"/mnt/models\",\n) -> str:\n    \"\"\"Download\
          \ a HuggingFace model to a PVC for caching.\n\n    If the model is already\
          \ present on the PVC, skips the download.\n\n    Args:\n        model_name:\
          \ HuggingFace model ID (e.g. 'mistralai/Mistral-7B-Instruct-v0.3').\n  \
          \      model_cache_pvc: Name of the PVC to store models (unused here, mounted\
          \ via pipeline).\n        model_cache_mount: Mount path for the model cache\
          \ PVC.\n\n    Returns:\n        The PVC sub-path where the model is stored.\n\
          \    \"\"\"\n    import os\n\n    from huggingface_hub import snapshot_download\n\
          \n    # Convert model name to a directory-safe path\n    # e.g. \"mistralai/Mistral-7B-Instruct-v0.3\"\
          \ -> \"mistralai--Mistral-7B-Instruct-v0.3\"\n    model_dir_name = model_name.replace(\"\
          /\", \"--\")\n    model_path = os.path.join(model_cache_mount, model_dir_name)\n\
          \n    # Check if model is already cached\n    config_path = os.path.join(model_path,\
          \ \"config.json\")\n    if os.path.exists(config_path):\n        file_count\
          \ = sum(1 for _ in os.scandir(model_path) if _.is_file())\n        print(f\"\
          Model '{model_name}' already cached at {model_path} ({file_count} files).\
          \ Skipping download.\")\n        return model_dir_name\n\n    # Download\
          \ the model snapshot\n    print(f\"Downloading model '{model_name}' to {model_path}...\"\
          )\n    os.makedirs(model_path, exist_ok=True)\n\n    snapshot_download(\n\
          \        repo_id=model_name,\n        local_dir=model_path,\n        local_dir_use_symlinks=False,\n\
          \    )\n\n    file_count = sum(1 for _ in os.scandir(model_path) if _.is_file())\n\
          \    print(f\"Model '{model_name}' downloaded to {model_path} ({file_count}\
          \ files).\")\n    return model_dir_name\n\n"
        image: registry.redhat.io/rhoai/odh-pipeline-runtime-datascience-cpu-py312-rhel9@sha256:f9844dc150592a9f196283b3645dda92bd80dfdb3d467fa8725b10267ea5bdbc
    exec-ingest-to-milvus:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ingest_to_milvus
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pymilvus>=2.4.0'\
          \ 'sentence-transformers>=2.2.0' 'requests>=2.28.0' 'boto3>=1.28.0'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ingest_to_milvus(\n    s3_endpoint: str,\n    s3_bucket: str,\n\
          \    milvus_host: str,\n    s3_prefix: str = \"chunks\",\n    embedding_endpoint:\
          \ str = \"\",\n    embedding_model: str = \"sentence-transformers/all-MiniLM-L6-v2\"\
          ,\n    embedding_dim: int = 384,\n    milvus_port: int = 19530,\n    milvus_db:\
          \ str = \"default\",\n    collection_name: str = \"rag_documents\",\n  \
          \  embed_batch_size: int = 64,\n    milvus_batch_size: int = 256,\n) ->\
          \ str:\n    \"\"\"Read chunks from S3, embed, and insert into Milvus.\n\n\
          \    Args:\n        s3_endpoint: S3-compatible endpoint URL (e.g. MinIO).\n\
          \        s3_bucket: S3 bucket containing chunk files.\n        milvus_host:\
          \ Milvus service hostname.\n        s3_prefix: Key prefix for chunk files\
          \ in S3.\n        embedding_endpoint: Optional embedding service URL. If\
          \ empty,\n            uses a local sentence-transformers model.\n      \
          \  embedding_model: Embedding model name (for API or local).\n        embedding_dim:\
          \ Dimension of the embedding vectors.\n        milvus_port: Milvus gRPC\
          \ port.\n        milvus_db: Milvus database name.\n        collection_name:\
          \ Milvus collection name.\n        embed_batch_size: Batch size for embedding\
          \ requests.\n        milvus_batch_size: Batch size for Milvus inserts.\n\
          \n    Returns:\n        The Milvus collection name and total vectors inserted.\n\
          \    \"\"\"\n    import json\n    import os\n    import time\n\n    import\
          \ boto3\n    import requests as req_lib\n    from pymilvus import CollectionSchema,\
          \ DataType, FieldSchema, MilvusClient\n\n    # --- Read chunks from S3 ---\n\
          \    s3 = boto3.client(\n        \"s3\",\n        endpoint_url=s3_endpoint,\n\
          \        aws_access_key_id=os.environ[\"S3_ACCESS_KEY\"],\n        aws_secret_access_key=os.environ[\"\
          S3_SECRET_KEY\"],\n        region_name=\"us-east-1\",\n    )\n\n    all_chunks\
          \ = []\n    file_count = 0\n    paginator = s3.get_paginator(\"list_objects_v2\"\
          )\n    for page in paginator.paginate(Bucket=s3_bucket, Prefix=s3_prefix\
          \ + \"/\"):\n        for obj in page.get(\"Contents\", []):\n          \
          \  key = obj[\"Key\"]\n            if not key.endswith(\".jsonl\"):\n  \
          \              continue\n            resp = s3.get_object(Bucket=s3_bucket,\
          \ Key=key)\n            body = resp[\"Body\"].read().decode(\"utf-8\")\n\
