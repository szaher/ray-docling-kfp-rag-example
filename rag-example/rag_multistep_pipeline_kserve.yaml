pipelineInfo:
  description: 'Multi-step RAG pipeline: parse & chunk PDFs with Docling (output to
    S3), deploy embedding model via KServe, ingest into Milvus with remote embeddings,
    download and deploy an LLM for inference.'
  name: rag-multi-step-pipeline-kserve-embeddings
root:
  dag:
    tasks:
      deploy-embedding-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-deploy-embedding-model
        inputs:
          parameters:
            cpu_limits:
              componentInputParameter: embedding_cpu_limits
            cpu_requests:
              componentInputParameter: embedding_cpu_requests
            max_replicas:
              componentInputParameter: embedding_max_replicas
            memory_limits:
              componentInputParameter: embedding_memory_limits
            memory_requests:
              componentInputParameter: embedding_memory_requests
            min_replicas:
              componentInputParameter: embedding_min_replicas
            model_name:
              componentInputParameter: embedding_model
            namespace:
              componentInputParameter: namespace
            serving_runtime_name:
              componentInputParameter: embedding_serving_runtime
        taskInfo:
          name: deploy-embedding-model
      download-model:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-download-model
        inputs:
          parameters:
            model_cache_pvc:
              componentInputParameter: model_cache_pvc
            model_name:
              componentInputParameter: llm_model_name
        taskInfo:
          name: download-model
      ingest-to-milvus:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-ingest-to-milvus
        dependentTasks:
        - deploy-embedding-model
        - parse-and-chunk
        inputs:
          parameters:
            collection_name:
              componentInputParameter: collection_name
            embed_batch_size:
              componentInputParameter: embed_batch_size
            embedding_dim:
              componentInputParameter: embedding_dim
            embedding_endpoint:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: deploy-embedding-model
            embedding_model:
              componentInputParameter: embedding_model
            milvus_host:
              componentInputParameter: milvus_host
            milvus_port:
              componentInputParameter: milvus_port
            s3_bucket:
              componentInputParameter: s3_bucket
            s3_endpoint:
              componentInputParameter: s3_endpoint
            s3_prefix:
              componentInputParameter: s3_prefix
        taskInfo:
          name: ingest-to-milvus
      model-deployment:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-model-deployment
        dependentTasks:
        - download-model
        inputs:
          parameters:
            gpu_count:
              componentInputParameter: gpu_count
            max_model_len:
              componentInputParameter: max_model_len
            model_cache_pvc:
              componentInputParameter: model_cache_pvc
            model_dir:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: download-model
            model_name:
              componentInputParameter: llm_model_name
            namespace:
              componentInputParameter: namespace
        taskInfo:
          name: model-deployment
      parse-and-chunk:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-parse-and-chunk
        inputs:
          parameters:
            chunk_max_tokens:
              componentInputParameter: chunk_max_tokens
            cpus_per_actor:
              componentInputParameter: cpus_per_actor
            input_path:
              componentInputParameter: input_path
            max_actors:
              componentInputParameter: max_actors
            min_actors:
              componentInputParameter: min_actors
            namespace:
              componentInputParameter: namespace
            num_files:
              componentInputParameter: num_files
            num_workers:
              componentInputParameter: num_workers
            pvc_mount_path:
              componentInputParameter: pvc_mount_path
            pvc_name:
              componentInputParameter: pvc_name
