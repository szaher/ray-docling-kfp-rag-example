---
# RBAC for the KFP pipeline service account.
#
# Grants permissions to create/manage RayJobs, RayClusters, and
# InferenceServices required by the pipeline components.
#
# Usage:
#   # Check your pipeline service account name:
#   oc get sa -n <namespace> | grep -E 'pipeline|dspa'
#
#   # Apply (adjust SA_NAME and NAMESPACE as needed):
#   oc apply -f rbac.yaml
#
# On OpenShift AI (RHOAI) with Data Science Pipelines, the service
# account is typically named "pipeline-runner-dspa" or "ds-pipeline-dspa".
#
# The Role lives in the TARGET namespace (where RayJobs/InferenceServices
# are created). The RoleBinding grants access to the pipeline SA from the
# SOURCE namespace (where the pipeline runs).

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-rag-role
  namespace: ray-docling
rules:
  # RayJob / RayCluster management (KubeRay)
  - apiGroups: ["ray.io"]
    resources: ["rayjobs", "rayclusters"]
    verbs: ["create", "get", "list", "watch", "patch", "update", "delete"]

  # InferenceService management (KServe)
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices"]
    verbs: ["create", "get", "list", "watch", "patch", "update", "delete"]

  # ServingRuntime management (created per model deployment)
  - apiGroups: ["serving.kserve.io"]
    resources: ["servingruntimes"]
    verbs: ["create", "get", "list", "watch", "patch", "update", "delete"]

  # Secrets — codeflare-sdk creates a Secret to store the zipped
  # working directory (entrypoint script) for the RayJob
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "patch", "delete"]

  # Pods — needed for monitoring RayJob worker pods
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # Events — for debugging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-rag-rolebinding
  namespace: ray-docling
subjects:
  # Pipeline runner service account from the namespace where the
  # pipeline runs. Adjust to match your DSP installation:
  #   oc get sa -n <pipeline-namespace> | grep -E 'pipeline|dspa'
  - kind: ServiceAccount
    name: pipeline-runner-dspa
    namespace: ray-docling
  # Also grant access to the dspa SA if present
  - kind: ServiceAccount
    name: ds-pipeline-dspa
    namespace: ray-docling
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-rag-role

---
# ClusterRole to read HardwareProfiles (cluster-scoped resource
# in redhat-ods-applications namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pipeline-hardwareprofile-reader
rules:
  - apiGroups: ["infrastructure.opendatahub.io"]
    resources: ["hardwareprofiles"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pipeline-hardwareprofile-reader-binding
subjects:
  - kind: ServiceAccount
    name: pipeline-runner-dspa
    namespace: ray-docling
  - kind: ServiceAccount
    name: ds-pipeline-dspa
    namespace: ray-docling
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pipeline-hardwareprofile-reader

---
# If the parse_and_chunk component uses `oc patch` via subprocess
# (which runs as the pod's SA), the SA also needs access to patch
# RayJobs. This is already covered by the Role above.
#
# If RayJobs are created in a different namespace than the pipeline,
# use a ClusterRole + ClusterRoleBinding instead, or add a separate
# Role in the RayJob namespace.

# Cross-namespace access: If Milvus is in a different namespace,
# no RBAC is needed — Milvus access is via network (gRPC), not
# the Kubernetes API.

# Cross-namespace access: If MinIO is in a different namespace,
# no RBAC is needed — MinIO access is via network (S3 API), not
# the Kubernetes API.
