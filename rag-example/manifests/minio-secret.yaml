---
# TEMPLATE: S3 (MinIO) credentials for the RAG pipeline
#
# ⚠️  DO NOT commit actual credentials to git
#
# The pipeline reads S3 credentials via environment variables from this Secret.
# The Secret keys must be "access_key" and "secret_key" to match the
# pipeline's use_secret_as_env mapping.
#
# Usage Option 1: Create from command line (RECOMMENDED)
#   oc create secret generic minio-secret \
#     --from-literal=access_key=YOUR_ACCESS_KEY \
#     --from-literal=secret_key=YOUR_SECRET_KEY \
#     -n ray-docling
#
# Usage Option 2: Use this template
#   1. Copy this file: cp minio-secret.yaml minio-secret.local.yaml
#   2. Edit minio-secret.local.yaml with your actual credentials
#   3. Apply: oc apply -f minio-secret.local.yaml
#   4. Do NOT commit minio-secret.local.yaml (it's in .gitignore)
#
# For development/testing with default MinIO installation:
#   Default credentials are usually: minioadmin / minioadmin
#
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: ray-docling
type: Opaque
stringData:
  access_key: "YOUR_MINIO_ACCESS_KEY"
  secret_key: "YOUR_MINIO_SECRET_KEY"
