---
# S3 (MinIO) credentials for the RAG pipeline.
# The pipeline reads these via environment variables (mounted from this Secret).
#
# Usage:
#   # Edit the values below, then apply:
#   oc apply -f minio-secret.yaml -n ray-docling
#
# The Secret keys must be "access_key" and "secret_key" to match the
# pipeline's use_secret_as_env mapping.
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: ray-docling
type: Opaque
stringData:
  access_key: "minioadmin"
  secret_key: "minioadmin"
